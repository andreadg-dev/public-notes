    <script>
      window.onload = (event) => {
        setCopyright();

        const sourceData = [markdownNotes, tablesData, tools];
        appendSectionToNavbar(sourceData);
        displaySectionOnClick(sourceData);

        //Apply the highlightAll method to format corresponding code
        //hljs.highlightAll();

        //setTimeout(updateHeadingBasedOnDevice, 50);
      };

      /*       $(window).on("resize", function () {
        updateHeadingBasedOnDevice();
      }); */

      /*       $(document).on("click", ".dropdown-item", function () {
        // Wait briefly after DOM change
        setTimeout(updateHeadingBasedOnDevice, 50);
      }); */

      $(document).on("click", "#category_filter_component input", function () {
        let categoryInput = $(this).val().toLowerCase();

        if (categoryInput !== "all") {
          $("tbody tr").filter(function () {
            $(this).toggle(
              $(this)
                .find(".snippet-category")
                .text()
                .toLowerCase()
                .includes(categoryInput),
            );
          });
          $("#subcategory_filter_component").remove();
          $("#category_filter_component").after(
            createSubcategoryRadioInputs(tablesData.snippets, categoryInput),
          );
        } else {
          $("#subcategory_filter_component").remove();
          $("tbody tr").show();
        }
        updateCounts("tbody tr");
      });

      $(document).on(
        "click",
        "#subcategory_filter_component input",
        function () {
          let subcategoryInput = $(this).val().toLowerCase();

          $("tbody tr").filter(function () {
            $(this).toggle(
              $(this)
                .find(".snippet-subcategory")
                .text()
                .toLowerCase()
                .includes(subcategoryInput),
            );
          });

          updateCounts("tbody tr");
        },
      );

      $(document).on("click", "#encodeHTMLButton", function () {
        const userInput = $("#inputBox").val();
        console.log(userInput);
        $("#outputBox").val(htmlEncode(userInput));
        //$("#inputBox").val() = null;
      });

      $(document).on("click", "#decodeJWTButton", function () {
        const userInput = $("#inputBox").val();
        console.log(userInput);
        $("#outputBox").val(decodeJWT(userInput));
        //$("#inputBox").val() = null;
      });

      $(document).on("click", ".snippet-copy-button", function () {
        $(this).toggleClass("hidden");
        $(this).next(".snippet-check-icon").toggleClass("hidden");

        setTimeout(() => {
          $(this).toggleClass("hidden");
          $(this).next(".snippet-check-icon").toggleClass("hidden");
        }, 2000);

        let snippetCodeLines = [];

        $(this)
          .closest(".code-wrapper")
          .find(".snippet-code-line")
          .each((index, codeLine) => {
            snippetCodeLines.push($(codeLine).text().trimEnd());
          });

        let textToCopy = snippetCodeLines.join("\r\n");

        //console.log(textToCopy);
        //console.log("isSecureContext:", window.isSecureContext);
        //console.log("clipboard:", navigator.clipboard);

        navigator.clipboard
          .writeText(textToCopy)
          .then(() => console.log("Copied:", textToCopy))
          .catch((err) => console.error("Clipboard error:", err));
      });
    </script>
